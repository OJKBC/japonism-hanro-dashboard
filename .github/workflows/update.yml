name: データ更新（毎日 06:00 JST）

on:
  schedule:
    - cron: "0 21 * * *"  # UTC 21:00 = JST 06:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: 収集・統合・data.json 更新
        run: python run_all.py

      - name: 変更があればコミット
        run: |
          git config user.name "japonism-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data data/raw data/cache
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "データ自動更新 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
            git push
          fi
