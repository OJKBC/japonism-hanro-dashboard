name: データ更新とサイト公開

on:
  schedule:
    - cron: "0 21 * * *"  # UTC 21:00 = JST 06:00
  workflow_dispatch:
  push:
    branches: [master, main]

permissions:
  contents: write

concurrency:
  group: pages-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: 収集・統合・data.json 更新
        # push（コード変更）時はスキップし、日次実行と手動実行のみ収集する
        if: github.event_name != 'push'
        run: python run_all.py

      - name: 変更があればコミット
        if: github.event_name != 'push'
        run: |
          git config user.name "japonism-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data data/raw data/cache
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "データ自動更新 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
            git push
          fi

      # actions/deploy-pages が連続失敗したため、gh-pages ブランチ配信方式を採用
      # （Pages側の設定は Source: Deploy from a branch / gh-pages / root）
      - name: gh-pages ブランチへ公開
        run: |
          cd site
          git init -b gh-pages
          git config user.name "japonism-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "サイト公開 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
