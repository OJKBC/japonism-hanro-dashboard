<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>JAPON!SM 販路拡大ダッシュボード</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <h1>JAPON!SM <span class="subtitle">販路拡大ダッシュボード</span></h1>
    <p class="updated">最終更新: <span id="updated-at">読み込み中…</span></p>
  </div>
</header>

<main>
  <nav class="tabs" id="tabs">
    <button class="tab active" data-category="all">すべて</button>
    <button class="tab" data-category="subsidy">補助金</button>
    <button class="tab" data-category="exhibition">展示会</button>
    <button class="tab" data-category="matching">商談会</button>
  </nav>

  <section class="controls">
    <input type="search" id="search" placeholder="キーワードで検索します（例: インバウンド）">
    <select id="region">
      <option value="">地域: すべて</option>
      <option value="全国">全国</option>
      <option value="北海道・東北">北海道・東北</option>
      <option value="関東・甲信越">関東・甲信越</option>
      <option value="東海・北陸">東海・北陸</option>
      <option value="近畿">近畿</option>
      <option value="中国・四国">中国・四国</option>
      <option value="九州・沖縄">九州・沖縄</option>
      <option value="海外">海外</option>
      <option value="オンライン">オンライン</option>
    </select>
    <label class="toggle">
      <input type="checkbox" id="deadline-only">
      締切が明記されたもののみ表示します
    </label>
  </section>

  <p class="result-count" id="result-count"></p>
  <div id="list" class="list"></div>
  <p class="empty" id="empty" hidden>条件に合う案件は見つかりませんでした。</p>
</main>

<footer class="site-footer">
  <p>掲載情報は自動収集によるものです。募集は中止・変更されることがありますので、
  申込・申請の正確な条件は必ず各公式ページでご確認ください。</p>
  <p>&copy; 株式会社JAPONISM</p>
</footer>

<script src="data/data.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
